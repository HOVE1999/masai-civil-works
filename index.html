<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masaisai Civil Works</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;}

body {
  font-family: Arial, sans-serif;
  background:#0b1218;
  color:white;
}

/* HERO */
header {
  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('project2.jpg');
  background-size: cover;
  background-position: center;
  height: 80vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
}

header h1 {
  font-size:3rem;
  color:#d4af37;
}

header p {
  margin:15px 0;
  font-size:1.1rem;
}

.btn {
  background:#d4af37;
  color:black;
  padding:12px 25px;
  text-decoration:none;
  border-radius:6px;
  font-weight:bold;
}

/* SECTION */
.section {
  padding:70px 20px;
  text-align:center;
}

.section h2 {
  color:#d4af37;
  margin-bottom:20px;
}

/* SERVICES */
.services {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-top:30px;
}

.card {
  background:#121c24;
  padding:25px;
  border-radius:12px;
  border:1px solid rgba(212,175,55,0.2);
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
}

/* GALLERY */
.gallery {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
  margin-top:30px;
}

.gallery img {
  width:100%;
  height:280px;
  object-fit:cover;
  border-radius:12px;
  transition:0.4s;
}

.gallery img:hover {
  transform:scale(1.07);
}

/* CONTACT */
.contact {
  background:#121c24;
  padding:30px;
  border-radius:12px;
  max-width:600px;
  margin:auto;
}

/* FOOTER */
footer {
  background:#060b10;
  padding:20px;
  text-align:center;
  color:#aaa;
}
</style>
</head>

<body>

<header>
  <div>
    <h1>MASAISAI CIVIL WORKS</h1>
    <p>Premium Construction • Ceilings • Finishing</p>
    <a class="btn" href="https://wa.me/263786596759">Get a Quote</a>
  </div>
</header>

<section class="section">
  <h2>Our Services</h2>
  <div class="services">
    <div class="card">Ceiling Installation</div>
    <div class="card">Interior Finishing</div>
    <div class="card">Renovations</div>
    <div class="card">Civil Works</div>
  </div>
</section>

<section class="section">
  <h2>Our Work</h2>
  <div class="gallery">
    <img src="project1.jpg">
    <img src="project2.jpg">
    <img src="project3.jpg">
  </div>
</section>

<section class="section">
  <h2>Contact Us</h2>
  <div class="contact">
    <p><strong>Phone:</strong> +263 78 659 6759</p>
    <p><strong>Email:</strong> aldridgehove@gmail.com</p>
    <p><strong>Location:</strong> 32 Cork Road, Harare</p>
  </div>
</section>

<footer>
  © 2026 Masaisai Civil Works
</footer>

</body>
</html>
