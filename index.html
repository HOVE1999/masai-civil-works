<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masaisai Civil Works</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #0f1720;
      color: #fff;
      line-height: 1.6;
    }
    header {
      background: linear-gradient(rgba(0,0,0,.55), rgba(0,0,0,.55)),
                  url('project2.jpg') center/cover no-repeat;
      min-height: 75vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }
    .hero {
      max-width: 800px;
    }
    .hero h1 {
      font-size: 3rem;
      color: #d4af37;
      margin-bottom: 15px;
      letter-spacing: 1px;
    }
    .hero p {
      font-size: 1.1rem;
      margin-bottom: 25px;
      color: #f5f5f5;
    }
    .btn {
      display: inline-block;
      background: #d4af37;
      color: #111;
      padding: 14px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }
    section {
      padding: 70px 20px;
    }
    .container {
      max-width: 1150px;
      margin: auto;
    }
    h2 {
      text-align: center;
      color: #d4af37;
      margin-bottom: 18px;
      font-size: 2rem;
    }
    .lead {
      text-align: center;
      max-width: 760px;
      margin: 0 auto 40px;
      color: #d6d6d6;
    }
    .services {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    .card {
      background: #18232e;
      padding: 25px;
      border-radius: 14px;
      border: 1px solid rgba(212,175,55,.18);
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,.2);
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 22px;
      margin-top: 35px;
    }
    .gallery-item {
      background: #18232e;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(212,175,55,.18);
      box-shadow: 0 12px 30px rgba(0,0,0,.22);
      transition: transform .3s ease, box-shadow .3s ease;
    }
    .gallery-item:hover {
      transform: translateY(-6px);
      box-shadow: 0 18px 35px rgba(0,0,0,.28);
    }
    .gallery img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      display: block;
    }
    .caption {
      padding: 16px;
      text-align: center;
      color: #f1f1f1;
      font-weight: 600;
    }
    .highlight {
      background: #111923;
    }
    .contact-box {
      background: #18232e;
      max-width: 700px;
      margin: 30px auto 0;
      padding: 30px;
      border-radius: 16px;
      border: 1px solid rgba(212,175,55,.18);
      text-align: center;
    }
    .contact-box p {
      margin: 10px 0;
      color: #e5e5e5;
    }
    footer {
      text-align: center;
      padding: 25px 20px;
      background: #0a1017;
      color: #bbb;
      font-size: .95rem;
    }
    @media (max-width: 768px) {
      .hero h1 { font-size: 2.2rem; }
      .gallery img { height: 240px; }
    }
  <.gallery img {
  width: 100%;
  height: 300px;
  object-fit: cover;
  border-radius: 12px;
  transition: 0.3s;
}

.gallery img:hover {
  transform: scale(1.05);
}>
</head>
<body>

  <header>
    <div class="hero">
      <h1>MASAISAI CIVIL WORKS</h1>
      <p>Professional ceilings, finishes, renovations and civil works with clean execution and premium results.</p>
      <a class="btn" href="https://wa.me/263786596759" target="_blank">Chat on WhatsApp</a>
    </div>
  </header>

  <section>
    <div class="container">
      <h2>Our Services</h2>
      <p class="lead">We deliver neat, modern interior finishes and reliable construction work for residential and commercial spaces.</p>

      <div class="services">
        <div class="card">Ceiling Installation</div>
        <div class="card">Interior Finishing</div>
        <div class="card">Renovations</div>
        <div class="card">Civil Works</div>
      </div>
    </div>
  </section>

  <section class="highlight">
    <div class="container">
      <h2>Featured Projects</h2>
      <p class="lead">From raw construction stages to polished final finishes.</p>

      <div class="gallery">
        <div class="gallery-item">
          <img src="project1.jpg" alt="Unpainted ceiling work">
          <div class="caption">Construction Stage</div>
        </div>

        <div class="gallery-item">
          <img src="project2.jpg" alt="Finished painted ceiling">
          <div class="caption">Finished Ceiling Design</div>
        </div>

        <div class="gallery-item">
          <img src="project3.jpg" alt="Completed interior room">
          <div class="caption">Completed Interior Space</div>
        </div>
      </div>
    </div>
  </section>

  <section>
    <div class="container">
      <h2>Contact Us</h2>
      <div class="contact-box">
        <p><strong>WhatsApp:</strong> +263 78 659 6759</p>
        <p><strong>Address:</strong> 32 Cork Road, Harare</p>
        <p><strong>Email:</strong> aldridgehove@gmail.com</p>
      </div>
    </div>
  </section>

  <footer>
    © 2026 Masaisai Civil Works. All rights reserved.
  </footer>

</body>
</html>
